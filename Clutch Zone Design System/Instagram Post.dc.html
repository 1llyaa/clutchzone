<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}</style>
</helmet>
<div style="position:relative; width:1080px; height:1080px; background:#0A0A0A; overflow:hidden; font-family:'Inter',system-ui,sans-serif;">
  <!-- grid -->
  <div style="position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px); background-size:60px 60px;"></div>
  <!-- orange glow -->
  <div style="position:absolute; top:-220px; right:-160px; width:760px; height:760px; background:radial-gradient(circle, rgba(232,74,26,0.16), transparent 62%); pointer-events:none;"></div>

  <div style="position:relative; height:100%; display:flex; flex-direction:column; padding:80px 80px 0;">
    <!-- top row -->
    <div style="display:flex; align-items:flex-start; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:14px;">
        <span style="width:48px; height:2px; background:#E84A1A;"></span>
        <span style="font-family:'Space Mono',monospace; font-size:22px; letter-spacing:5px; color:#E84A1A; text-transform:uppercase;">TURNAJ</span>
      </div>
      <div style="width:64px; height:64px;">
        <svg viewBox="0 0 100 100" style="width:100%; height:100%; display:block;">
          <rect x="0" y="0" width="100" height="100" rx="14" fill="#0A0A0A"></rect>
          <rect x="1" y="1" width="98" height="98" rx="13" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.6"></rect>
          <circle cx="50" cy="50" r="40" fill="#E8E5DC"></circle>
          <circle cx="50" cy="50" r="32" fill="#141414"></circle>
          <circle cx="50" cy="50" r="24" fill="#E8E5DC"></circle>
          <circle cx="50" cy="50" r="16" fill="#141414"></circle>
          <circle cx="50" cy="50" r="9" fill="#E84A1A"></circle>
        </svg>
      </div>
    </div>

    <!-- headline -->
    <div style="margin-top:72px;">
      <h1 style="font-family:'Bebas Neue',sans-serif; font-size:172px; line-height:0.84; letter-spacing:3px; color:#fff; text-transform:uppercase;">CS2<br>SUMMER<br>CLASH</h1>
      <div style="display:inline-flex; align-items:center; gap:18px; margin-top:36px; background:#E84A1A; padding:14px 28px; border-radius:2px;">
        <span style="font-family:'Bebas Neue',sans-serif; font-size:46px; letter-spacing:4px; color:#fff;">15 · 07 · 2026</span>
      </div>
    </div>

    <!-- info -->
    <div style="display:flex; gap:80px; margin-top:64px;">
      <div>
        <span style="font-family:'Space Mono',monospace; font-size:18px; letter-spacing:3px; color:#888; text-transform:uppercase;">PRIZE POOL</span>
        <div style="font-family:'Bebas Neue',sans-serif; font-size:72px; color:#fff; line-height:1;">5 000 Kč</div>
      </div>
      <div style="border-left:1px solid #2A2A2A; padding-left:80px;">
        <span style="font-family:'Space Mono',monospace; font-size:18px; letter-spacing:3px; color:#888; text-transform:uppercase;">FORMÁT</span>
        <div style="font-family:'Bebas Neue',sans-serif; font-size:72px; color:#fff; line-height:1;">16 TÝMŮ · 5v5</div>
      </div>
    </div>

    <!-- bottom bar -->
    <div style="margin-top:auto; margin-left:-80px; margin-right:-80px; background:#111; border-top:2px solid #E84A1A; padding:40px 80px; display:flex; align-items:center; justify-content:space-between;">
      <span style="font-family:'Inter',sans-serif; font-weight:300; font-size:30px; color:#E8E8E8;">Registrace do <span style="color:#fff; font-weight:600;">10. 07.</span> · omezený počet míst</span>
      <span style="font-family:'Bebas Neue',sans-serif; font-size:40px; letter-spacing:2px; color:#E84A1A;">CLUTCHZONE.CZ</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:1080}}"></script>
</body>
</html>
