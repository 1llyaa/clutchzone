<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}</style>
</helmet>
<div style="position:relative; width:1080px; height:1920px; background:#0A0A0A; overflow:hidden; font-family:'Inter',system-ui,sans-serif;">
  <!-- grid -->
  <div style="position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px); background-size:60px 60px;"></div>
  <!-- glow -->
  <div style="position:absolute; top:520px; left:50%; transform:translateX(-50%); width:900px; height:900px; background:radial-gradient(circle, rgba(232,74,26,0.16), transparent 60%); pointer-events:none;"></div>

  <!-- content within safe zone (250 top / 250 bottom) -->
  <div style="position:relative; height:100%; display:flex; flex-direction:column; align-items:center; text-align:center; padding:250px 90px;">

    <!-- logo top-center -->
    <div style="width:96px; height:96px;">
      <svg viewBox="0 0 100 100" style="width:100%; height:100%; display:block;">
        <rect x="0" y="0" width="100" height="100" rx="14" fill="#0A0A0A"></rect>
        <rect x="1" y="1" width="98" height="98" rx="13" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.6"></rect>
        <circle cx="50" cy="50" r="40" fill="#E8E5DC"></circle>
        <circle cx="50" cy="50" r="32" fill="#141414"></circle>
        <circle cx="50" cy="50" r="24" fill="#E8E5DC"></circle>
        <circle cx="50" cy="50" r="16" fill="#141414"></circle>
        <circle cx="50" cy="50" r="9" fill="#E84A1A"></circle>
      </svg>
    </div>
    <span style="font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:4px; color:#fff; margin-top:18px;">CLUTCH ZONE</span>

    <!-- eyebrow -->
    <div style="display:flex; align-items:center; gap:16px; margin-top:120px;">
      <span style="width:40px; height:2px; background:#E84A1A;"></span>
      <span style="font-family:'Space Mono',monospace; font-size:22px; letter-spacing:5px; color:#E84A1A; text-transform:uppercase;">PO–PÁ · 10:00–14:00</span>
      <span style="width:40px; height:2px; background:#E84A1A;"></span>
    </div>

    <!-- headline -->
    <h1 style="font-family:'Bebas Neue',sans-serif; font-size:188px; line-height:0.86; letter-spacing:3px; color:#fff; text-transform:uppercase; margin-top:40px;">HAPPY<br>HOUR</h1>

    <!-- price -->
    <div style="margin-top:64px; display:flex; flex-direction:column; align-items:center;">
      <span style="font-family:'Space Mono',monospace; font-size:22px; letter-spacing:4px; color:#888; text-transform:uppercase;">JEN</span>
      <div style="font-family:'Bebas Neue',sans-serif; font-size:240px; line-height:0.9; color:#E84A1A;">89 <span style="font-family:'Inter',sans-serif; font-weight:600; font-size:56px; color:#fff; letter-spacing:0;">Kč / hod</span></div>
    </div>

    <p style="font-family:'Inter',sans-serif; font-weight:300; font-size:34px; line-height:1.6; color:#E8E8E8; max-width:720px; margin-top:48px;">Špičkové herní PC za zlomek ceny. Přijď v dopoledních hodinách a hraj levněji.</p>

    <!-- CTA near bottom safe zone -->
    <button style="margin-top:auto; width:100%; background:#E84A1A; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:3px; padding:40px; border:none; border-radius:2px;">REZERVOVAT MÍSTO</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:1920}}"></script>
</body>
</html>
