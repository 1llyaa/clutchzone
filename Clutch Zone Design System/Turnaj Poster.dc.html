<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}</style>
</helmet>
<div style="position:relative; width:1080px; height:1350px; background:#0A0A0A; overflow:hidden; font-family:'Inter',system-ui,sans-serif;">
  <!-- grid -->
  <div style="position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px); background-size:60px 60px;"></div>
  <!-- center radial glow -->
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:1100px; height:1100px; background:radial-gradient(circle, rgba(232,74,26,0.14), transparent 58%); pointer-events:none;"></div>

  <div style="position:relative; height:100%; display:flex; flex-direction:column; padding:72px;">

    <!-- TOP ZONE ~40% -->
    <div style="flex:0 0 40%; display:flex; flex-direction:column; justify-content:flex-start;">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center; gap:14px;">
          <span style="width:44px; height:2px; background:#E84A1A;"></span>
          <span style="font-family:'Space Mono',monospace; font-size:20px; letter-spacing:5px; color:#E84A1A; text-transform:uppercase;">CS2 TURNAJ</span>
        </div>
        <div style="width:60px; height:60px;">
          <svg viewBox="0 0 100 100" style="width:100%; height:100%; display:block;">
            <rect x="0" y="0" width="100" height="100" rx="14" fill="#0A0A0A"></rect>
            <rect x="1" y="1" width="98" height="98" rx="13" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.6"></rect>
            <circle cx="50" cy="50" r="40" fill="#E8E5DC"></circle>
            <circle cx="50" cy="50" r="32" fill="#141414"></circle>
            <circle cx="50" cy="50" r="24" fill="#E8E5DC"></circle>
            <circle cx="50" cy="50" r="16" fill="#141414"></circle>
            <circle cx="50" cy="50" r="9" fill="#E84A1A"></circle>
          </svg>
        </div>
      </div>
      <h1 style="font-family:'Bebas Neue',sans-serif; font-size:180px; line-height:0.82; letter-spacing:3px; color:#fff; text-transform:uppercase; margin-top:40px;">SUMMER<br>CLASH</h1>
      <div style="font-family:'Bebas Neue',sans-serif; font-size:72px; letter-spacing:6px; color:#E84A1A; margin-top:24px;">15 · 07 · 2026</div>
    </div>

    <!-- MID ZONE ~30% : details -->
    <div style="flex:0 0 30%; display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; align-content:center; border-top:1px solid #2A2A2A; border-bottom:1px solid #2A2A2A;">
      <div>
        <span style="font-family:'Space Mono',monospace; font-size:16px; letter-spacing:3px; color:#888; text-transform:uppercase;">PRIZE POOL</span>
        <div style="font-family:'Bebas Neue',sans-serif; font-size:84px; color:#fff; line-height:1; margin-top:8px;">5 000 Kč</div>
      </div>
      <div style="border-left:1px solid #2A2A2A; padding-left:24px;">
        <span style="font-family:'Space Mono',monospace; font-size:16px; letter-spacing:3px; color:#888; text-transform:uppercase;">FORMÁT</span>
        <div style="font-family:'Bebas Neue',sans-serif; font-size:84px; color:#fff; line-height:1; margin-top:8px;">5v5</div>
      </div>
      <div style="border-left:1px solid #2A2A2A; padding-left:24px;">
        <span style="font-family:'Space Mono',monospace; font-size:16px; letter-spacing:3px; color:#888; text-transform:uppercase;">KAPACITA</span>
        <div style="font-family:'Bebas Neue',sans-serif; font-size:84px; color:#fff; line-height:1; margin-top:8px;">16 TÝMŮ</div>
      </div>
    </div>

    <!-- BOTTOM ZONE ~30% : location + CTA -->
    <div style="flex:0 0 30%; display:flex; flex-direction:column; justify-content:center; gap:28px;">
      <div style="display:flex; align-items:center; gap:14px;">
        <span style="font-family:'Space Mono',monospace; font-size:18px; letter-spacing:3px; color:#E8E8E8; text-transform:uppercase;">CLUTCH ZONE · ČESKÉ BUDĚJOVICE</span>
      </div>
      <div style="display:flex; align-items:center; gap:24px;">
        <div style="background:#E84A1A; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:48px; letter-spacing:3px; padding:26px 56px; border-radius:2px;">REGISTRACE OTEVŘENA</div>
        <span style="font-family:'Inter',sans-serif; font-weight:300; font-size:24px; color:#888;">Uzávěrka <span style="color:#fff; font-weight:600;">10. 07.</span><br>na clutchzone.cz</span>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:1350}}"></script>
</body>
</html>
